name: Scrape Tel Aviv Events

on:
  schedule:
      - cron: "0 3 * * *"

  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check DNS access to Tel Aviv website
        run: |
          echo "Checking DNS..."
          getent hosts www.tel-aviv.gov.il || true
          nslookup www.tel-aviv.gov.il || true
          curl -I -L --max-time 20 https://www.tel-aviv.gov.il/Visitors/Events/Pages/Events.aspx || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium --with-deps

      - name: Create Firebase key file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase_key.json

      - name: Run scraper
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          python events_scraper.py
